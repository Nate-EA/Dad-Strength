<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Strength Tracker v5.1 - Strength Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ravens-purple: #241773;
            --ravens-gold: #9E7C0C;
            --light-purple: #3D2C8D;
            --pale-purple: #E8E5F2;
            --cream: #F5F5F0;
            --shadow: rgba(36, 23, 115, 0.12);
            --green: #22c55e;
            --red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--pale-purple) 0%, var(--cream) 100%);
            min-height: 100vh;
        }

        .header {
            background: var(--ravens-purple);
            padding: 24px 20px 16px;
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .flag-accent {
            width: 60px;
            height: 8px;
            background: linear-gradient(90deg, var(--ravens-gold) 0%, var(--ravens-gold) 50%, var(--ravens-purple) 50%, var(--ravens-purple) 100%);
            margin-bottom: 16px;
            border-radius: 4px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .app-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: white;
            letter-spacing: 1px;
        }

        .session-timer {
            background: rgba(158, 124, 12, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--ravens-gold);
        }

        .tab-navigation {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            font-family: 'Bebas Neue', sans-serif;
            padding: 8px 16px;
            border: 2px solid var(--ravens-gold);
            background: transparent;
            color: var(--ravens-gold);
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
        }

        .tab-btn.active {
            background: var(--ravens-gold);
            color: var(--ravens-purple);
        }

        .start-workout-btn {
            font-family: 'Bebas Neue', sans-serif;
            padding: 20px 40px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            width: 100%;
            margin: 20px;
        }

        .day-info {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--ravens-gold);
        }

        .day-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--ravens-purple);
        }

        .exercises-list {
            padding: 0 20px;
        }

        .exercise-card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }

        .exercise-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--ravens-purple);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(1, 33, 105, 0.8);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            border-radius: 16px;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            background: var(--ravens-purple);
            padding: 24px 20px;
            position: sticky;
            top: 0;
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: white;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 205, 0, 0.2);
            border: none;
            color: var(--ravens-gold);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 20;
        }

        .modal-body {
            padding: 24px 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--ravens-purple);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--green);
        }

        .strength-score-card {
            background: linear-gradient(135deg, var(--ravens-purple) 0%, var(--light-purple) 100%);
            padding: 24px;
            border-radius: 16px;
            margin: 20px;
            text-align: center;
            color: white;
        }

        .strength-score-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 64px;
            line-height: 1;
        }

        .progress-section {
            margin: 16px 0;
        }

        .progress-bar-bg {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--ravens-gold) 0%, var(--ravens-purple) 100%);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="flag-accent"></div>
        <div class="header-content">
            <button id="backToHome" onclick="goHome()" style="background: rgba(158,124,12,0.2); border:none; color:var(--ravens-gold); padding:8px 16px; border-radius:8px; cursor:pointer; display:none;">
                ← Home
            </button>
            <div class="app-title">Dad Strength</div>
            <div class="session-timer" id="sessionTimer">00:00</div>
        </div>
        <div class="tab-navigation" id="tabNavigation" style="display:none;">
            <button class="tab-btn" onclick="switchTab('dayA')">Day A</button>
            <button class="tab-btn" onclick="switchTab('dayB')">Day B</button>
            <button class="tab-btn" onclick="switchTab('dayC')">Day C</button>
            <button class="tab-btn" onclick="switchTab('stats')">Stats</button>
            <button class="tab-btn" onclick="switchTab('history')">History</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Home Tab -->
    <div id="homeTab">
        <div style="padding:20px;">
            <div style="background:linear-gradient(135deg,var(--ravens-purple),var(--light-purple)); border-radius:16px; padding:40px 24px; text-align:center; margin-bottom:24px;">
                <div style="font-size:64px; margin-bottom:16px;">🏋🏾</div>
                <div style="font-family:'Bebas Neue',sans-serif; font-size:42px; color:white;">Dad Strength</div>
                <div style="color:var(--ravens-gold);">STOP BEING A BITCH AND COME ON!</div>
            </div>

            <div style="display:grid; gap:12px;">
                <button onclick="goToDay('A')" style="padding:20px; background:white; border:2px solid var(--ravens-gold); border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:left;">
                        <div style="font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--ravens-purple);">Day A</div>
                        <div style="font-size:13px; color:var(--light-purple);">Upper + Hinge • 6 exercises</div>
                    </div>
                    <div style="font-size:40px;">💪</div>
                </button>

                <button onclick="goToDay('B')" style="padding:20px; background:white; border:2px solid var(--ravens-purple); border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:left;">
                        <div style="font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--ravens-purple);">Day B</div>
                        <div style="font-size:13px; color:var(--light-purple);">Upper + Core • 6 exercises</div>
                    </div>
                    <div style="font-size:40px;">🔥</div>
                </button>

                <button onclick="goToDay('C')" style="padding:20px; background:white; border:2px solid var(--ravens-gold); border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:left;">
                        <div style="font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--ravens-purple);">Day C</div>
                        <div style="font-size:13px; color:var(--light-purple);">Hinge + Upper • 6 exercises</div>
                    </div>
                    <div style="font-size:40px;">⚡</div>
                </button>

                <button onclick="goToStats()" style="padding:20px; background:linear-gradient(135deg,var(--ravens-gold),#c4961a); border:none; border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:left;">
                        <div style="font-family:'Bebas Neue',sans-serif; font-size:28px; color:white;">View Stats</div>
                        <div style="font-size:13px; color:var(--ravens-purple);">Strength Matrix</div>
                    </div>
                    <div style="font-size:40px;">📊</div>
                </button>

                <button onclick="goToHistory()" style="padding:20px; background:linear-gradient(135deg,var(--ravens-purple),var(--light-purple)); border:none; border-radius:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:left;">
                        <div style="font-family:'Bebas Neue',sans-serif; font-size:28px; color:white;">View History</div>
                        <div style="font-size:13px; color:var(--ravens-gold);">All workouts & logs</div>
                    </div>
                    <div style="font-size:40px;">📊</div>
                </button>
            </div>
        </div>
    </div>

    <!-- Workout Tab -->
    <div id="workoutTab" style="display:none;">
        <div style="margin:20px;">
            <button class="start-workout-btn" id="startWorkoutBtn" onclick="toggleWorkout()">Start Workout</button>
        </div>
        <div id="dayInfo" class="day-info"></div>
        <div id="exercisesList" class="exercises-list"></div>
    </div>

    <!-- Stats Tab -->
    <div id="statsTab" style="display:none;">
        <div class="strength-score-card">
            <div class="strength-score-value" id="statsCoreScore">0</div>
            <div class="strength-score-label">CORE STRENGTH SCORE</div>
            <div id="statsScoreTrend" style="font-size:13px;">↑ 0 from last week</div>
            <div style="font-size:12px; margin-top:8px;" id="statsAccessoryInfo"></div>
        </div>

        <div style="padding:20px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px;">
                <div style="background:white; padding:20px; border-radius:12px; text-align:center; border:2px solid var(--ravens-gold);">
                    <div style="font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--ravens-purple);" id="statsWeeklyWorkouts">0</div>
                    <div style="font-size:11px; color:var(--light-purple);">Workouts This Week</div>
                </div>
                <div style="background:white; padding:20px; border-radius:12px; text-align:center; border:2px solid var(--ravens-gold);">
                    <div style="font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--ravens-purple);" id="statsTotalPRs">0</div>
                    <div style="font-size:11px; color:var(--light-purple);">Personal Records</div>
                </div>
            </div>

            <!-- Strength Matrix -->
            <div style="background:white; padding:20px; border-radius:12px;">
                <div style="font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--ravens-purple); margin-bottom:16px;">💪 STRENGTH MATRIX</div>
                <div id="strengthMatrixGrid"></div>
                <div id="accessoryBreakdown" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <!-- History Tab -->
    <div id="historyTab" style="display:none; padding:20px;">
        <div style="background:white; padding:20px; border-radius:12px;">
            <div style="font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--ravens-purple); margin-bottom:16px;">Exercise Log</div>
            <div id="exerciseLogContent"></div>
        </div>
    </div>

    <!-- Exercise Modal -->
    <div id="exerciseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-btn" onclick="closeModal()">×</button>
                <div class="modal-title" id="modalExerciseName"></div>
            </div>
            <div class="modal-body">
                <div id="setsContainer"></div>
                <button class="save-btn" onclick="saveWorkout()" style="width:100%; padding:16px; background:var(--ravens-purple); color:white; border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:18px; cursor:pointer;">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Workout Data
        const workoutData = {
            A: { title: "Day A", description: "Upper + Hinge Focus", exercises: [
                { name: "Barbell Bench Press", sets: 4, reps: "6–8" },
                { name: "Lat Pulldown", sets: 4, reps: "8–10" },
                { name: "Seated Cable Row", sets: 3, reps: "8–12" },
                { name: "Deadlift", sets: 3, reps: "6–8" },
                { name: "Single Arm DB Row", sets: 3, reps: "8-12" }
            ]},
            B: { title: "Day B", description: "Upper + Core Focus", exercises: [
                { name: "Incline DB Bench Press", sets: 3, reps: "8–12" },
                { name: "Seated DB Shoulder Press", sets: 3, reps: "8–10" },
                { name: "Lat Pulldown", sets: 3, reps: "8–10" },
                { name: "Barbell Shoulder Press", sets: 3, reps: "6–10" },
                { name: "Single Arm DB Row", sets: 3, reps: "8-12" }
            ]},
            C: { title: "Day C", description: "Hinge + Upper Balance", exercises: [
                { name: "Romanian Deadlift", sets: 3, reps: "8–10" },
                { name: "Good Mornings", sets: 3, reps: "10" },
                { name: "Barbell Shoulder Press", sets: 3, reps: "6–10" },
                { name: "Deadlift", sets: 3, reps: "6–8" },
                { name: "Single Arm DB Row", sets: 3, reps: "8-12" }
            ]}
        };

        // Strength Matrix - UPDATED 1RM STANDARDS
        const strengthMatrix = {
            'Barbell Bench Press': { rookie: 40, built: 70, strong: 100, veteran: 120, elite: 140 },
            'Barbell Shoulder Press': { rookie: 30, built: 50, strong: 60, veteran: 75, elite: 90 },
            'Deadlift': { rookie: 80, built: 100, strong: 140, veteran: 200, elite: 240 },
            'Lat Pulldown': { rookie: 40, built: 60, strong: 80, veteran: 100, elite: 120 },
            'Single Arm DB Row': { rookie: 20, built: 30, strong: 40, veteran: 50, elite: 60 }
        };

        const coreLifts = Object.keys(strengthMatrix);

        // Global Variables
        let currentDay = 'A';
        let currentExercise = null;
        let workoutActive = false;
        let sessionStartTime = null;
        let sessionInterval = null;

        // History stack for back button
        const historyStack = {
            stack: ['home'],
            currentIndex: 0,
            push(state) { this.stack.push(state); this.currentIndex++; },
            back() { if (this.currentIndex > 0) { this.currentIndex--; return this.stack[this.currentIndex]; } return null; }
        };

        // Initialize
        history.replaceState({ page: 'home' }, '', '');
        historyStack.replace('home');

        // Back button handler
        window.addEventListener('popstate', function(event) {
            event.preventDefault();
            const modal = document.getElementById('exerciseModal');
            if (modal.classList.contains('active')) {
                closeModal();
                return;
            }
            const prevState = historyStack.back();
            if (prevState) navigateToPage(prevState);
        });

        function navigateToPage(page) {
            document.getElementById('homeTab').style.display = page === 'home' ? 'block' : 'none';
            document.getElementById('workoutTab').style.display = page === 'workout' ? 'block' : 'none';
            document.getElementById('statsTab').style.display = page === 'stats' ? 'block' : 'none';
            document.getElementById('historyTab').style.display = page === 'history' ? 'block' : 'none';
            document.getElementById('tabNavigation').style.display = page !== 'home' ? 'flex' : 'none';
            document.getElementById('backToHome').style.display = page !== 'home' ? 'block' : 'none';
            
            if (page === 'workout') renderDay();
            if (page === 'stats') renderStats();
            if (page === 'history') renderHistory();
        }

        function goHome() { 
            history.pushState({ page: 'home' }, '', '');
            historyStack.push('home');
            navigateToPage('home');
        }

        function goToDay(day) { 
            currentDay = day;
            history.pushState({ page: 'workout' }, '', '');
            historyStack.push('workout');
            navigateToPage('workout');
        }

        function goToStats() { 
            history.pushState({ page: 'stats' }, '', '');
            historyStack.push('stats');
            navigateToPage('stats');
        }

        function goToHistory() { 
            history.pushState({ page: 'history' }, '', '');
            historyStack.push('history');
            navigateToPage('history');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'dayA' || tab === 'dayB' || tab === 'dayC') {
                if (tab === 'dayA') currentDay = 'A';
                else if (tab === 'dayB') currentDay = 'B';
                else if (tab === 'dayC') currentDay = 'C';
                renderDay();
            } else if (tab === 'stats') renderStats();
            else if (tab === 'history') renderHistory();
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function calculate1RM(weight, reps) {
            if (reps <= 1) return weight;
            if (reps > 10) return 0;
            return Math.round(weight * (36 / (37 - reps)));
        }

        // Render Functions
        function renderDay() {
            const data = workoutData[currentDay];
            document.getElementById('dayInfo').innerHTML = `
                <div class="day-title">${data.title}</div>
                <div class="day-description">${data.description}</div>
            `;
            
            document.getElementById('exercisesList').innerHTML = data.exercises.map((ex, idx) => `
                <div class="exercise-card" onclick="openExercise('${ex.name}')">
                    <div class="exercise-name">${ex.name}</div>
                    <div style="font-size:14px; color:#888;">${ex.sets} × ${ex.reps}</div>
                </div>
            `).join('');
        }

        function openExercise(exerciseName) {
            currentExercise = workoutData[currentDay].exercises.find(ex => ex.name === exerciseName);
            document.getElementById('modalExerciseName').textContent = exerciseName;
            
            let setsHtml = '';
            for (let i = 1; i <= currentExercise.sets; i++) {
                setsHtml += `
                    <div style="margin-bottom:12px;">
                        <div style="font-weight:600; margin-bottom:4px;">Set ${i}</div>
                        <input type="number" id="set-${i}-weight" placeholder="Weight (kg)" style="width:48%; padding:8px; margin-right:4%; border:2px solid #e0e0e0; border-radius:8px;">
                        <input type="number" id="set-${i}-reps" placeholder="Reps" style="width:48%; padding:8px; border:2px solid #e0e0e0; border-radius:8px;">
                    </div>
                `;
            }
            document.getElementById('setsContainer').innerHTML = setsHtml;
            document.getElementById('exerciseModal').classList.add('active');
            history.pushState({ page: 'modal' }, '', '');
            historyStack.push('modal');
        }

        function closeModal() {
            document.getElementById('exerciseModal').classList.remove('active');
            historyStack.back();
            history.back();
        }

        function saveWorkout() {
            const sets = [];
            for (let i = 1; i <= currentExercise.sets; i++) {
                const weight = document.getElementById(`set-${i}-weight`)?.value;
                const reps = document.getElementById(`set-${i}-reps`)?.value;
                if (weight && reps) sets.push({ weight: parseFloat(weight), reps: parseInt(reps) });
            }
            
            if (sets.length === 0) {
                showToast('Enter at least one set!', 'error');
                return;
            }

            const workout = {
                id: Date.now().toString(),
                day: currentDay,
                exercise: currentExercise.name,
                date: new Date().toISOString(),
                sets: sets
            };

            let history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            history.push(workout);
            localStorage.setItem('workoutHistory', JSON.stringify(history));
            
            showToast('Exercise saved! 💪', 'success');
            closeModal();
            renderDay();
            if (document.getElementById('statsTab').style.display !== 'none') renderStats();
        }

        function toggleWorkout() {
            workoutActive = !workoutActive;
            const btn = document.getElementById('startWorkoutBtn');
            if (workoutActive) {
                btn.textContent = 'End Workout';
                btn.style.background = 'var(--red)';
                sessionStartTime = Date.now();
                sessionInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    document.getElementById('sessionTimer').textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                }, 1000);
                showToast('Workout started! 💪', 'success');
            } else {
                if (confirm('End workout?')) {
                    clearInterval(sessionInterval);
                    document.getElementById('sessionTimer').textContent = '00:00';
                    btn.textContent = 'Start Workout';
                    btn.style.background = 'var(--green)';
                    workoutActive = false;
                } else {
                    workoutActive = true;
                }
            }
        }

        function calculateCoreStrengthScore(history) {
            const exerciseBest = {};
            history.forEach(w => {
                const max1RM = Math.max(...w.sets.map(s => calculate1RM(s.weight, s.reps)));
                if (coreLifts.includes(w.exercise)) {
                    if (!exerciseBest[w.exercise] || max1RM > exerciseBest[w.exercise]) {
                        exerciseBest[w.exercise] = max1RM;
                    }
                } else if (w.exercise.includes('Bench Press')) {
                    if (!exerciseBest['Barbell Bench Press'] || max1RM > exerciseBest['Barbell Bench Press']) {
                        exerciseBest['Barbell Bench Press'] = max1RM;
                    }
                } else if (w.exercise.includes('Shoulder Press')) {
                    if (!exerciseBest['Barbell Shoulder Press'] || max1RM > exerciseBest['Barbell Shoulder Press']) {
                        exerciseBest['Barbell Shoulder Press'] = max1RM;
                    }
                } else if (w.exercise.includes('Deadlift')) {
                    if (!exerciseBest['Deadlift'] || max1RM > exerciseBest['Deadlift']) {
                        exerciseBest['Deadlift'] = max1RM;
                    }
                } else if (w.exercise.includes('Lat Pulldown')) {
                    if (!exerciseBest['Lat Pulldown'] || max1RM > exerciseBest['Lat Pulldown']) {
                        exerciseBest['Lat Pulldown'] = max1RM;
                    }
                } else if (w.exercise.includes('Single Arm DB Row')) {
                    if (!exerciseBest['Single Arm DB Row'] || max1RM > exerciseBest['Single Arm DB Row']) {
                        exerciseBest['Single Arm DB Row'] = max1RM;
                    }
                }
            });
            
            return Math.round(Object.values(exerciseBest).reduce((a, b) => a + b, 0));
        }

        function calculateAccessoryScore(history) {
            const accessoryBest = {};
            history.forEach(w => {
                if (!coreLifts.some(l => w.exercise.includes(l)) && 
                    !w.exercise.includes('Bench') && !w.exercise.includes('Press') && 
                    !w.exercise.includes('Deadlift') && !w.exercise.includes('Lat') && 
                    !w.exercise.includes('Single Arm')) {
                    const max1RM = Math.max(...w.sets.map(s => calculate1RM(s.weight, s.reps)));
                    if (!accessoryBest[w.exercise] || max1RM > accessoryBest[w.exercise]) {
                        accessoryBest[w.exercise] = max1RM;
                    }
                }
            });
            return {
                total: Math.round(Object.values(accessoryBest).reduce((a, b) => a + b, 0)),
                count: Object.keys(accessoryBest).length,
                details: accessoryBest
            };
        }

        function getTier(estimated1RM, exercise) {
            const std = strengthMatrix[exercise];
            if (!std) return null;
            if (estimated1RM >= std.elite) return { tier: 'ELITE', color: '#f8d7da', textColor: '#721c24', progress: 100, next: null };
            if (estimated1RM >= std.veteran) return { tier: 'VETERAN', color: '#d1ecf1', textColor: '#0c5460', progress: ((estimated1RM - std.veteran) / (std.elite - std.veteran)) * 100, next: std.elite, nextTier: 'ELITE' };
            if (estimated1RM >= std.strong) return { tier: 'STRONG', color: '#cce5ff', textColor: '#004085', progress: ((estimated1RM - std.strong) / (std.veteran - std.strong)) * 100, next: std.veteran, nextTier: 'VETERAN' };
            if (estimated1RM >= std.built) return { tier: 'BUILT', color: '#d4edda', textColor: '#155724', progress: ((estimated1RM - std.built) / (std.strong - std.built)) * 100, next: std.strong, nextTier: 'STRONG' };
            return { tier: 'ROOKIE', color: '#e0e0e0', textColor: '#666', progress: (estimated1RM / std.built) * 100, next: std.built, nextTier: 'BUILT' };
        }

        function renderStrengthMatrix() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            const exerciseBest = {};
            
            history.forEach(w => {
                let exercise = w.exercise;
                if (exercise.includes('Bench Press')) exercise = 'Barbell Bench Press';
                else if (exercise.includes('Shoulder Press')) exercise = 'Barbell Shoulder Press';
                else if (exercise.includes('Deadlift')) exercise = 'Deadlift';
                else if (exercise.includes('Lat Pulldown')) exercise = 'Lat Pulldown';
                else if (exercise.includes('Single Arm DB Row')) exercise = 'Single Arm DB Row';
                
                if (strengthMatrix[exercise]) {
                    const max1RM = Math.max(...w.sets.map(s => calculate1RM(s.weight, s.reps)));
                    if (!exerciseBest[exercise] || max1RM > exerciseBest[exercise]) {
                        exerciseBest[exercise] = max1RM;
                    }
                }
            });

            let html = '';
            const icons = { 'Barbell Bench Press': '🏋️', 'Barbell Shoulder Press': '🏋️', 'Deadlift': '💪', 'Lat Pulldown': '⬇️', 'Single Arm DB Row': '⛓️' };
            
            Object.entries(exerciseBest).forEach(([exercise, est1RM]) => {
                const tier = getTier(est1RM, exercise);
                const icon = icons[exercise] || '🏋️';
                html += `
                    <div style="background:white; border-radius:12px; padding:16px; margin-bottom:12px; border-left:4px solid ${tier.color};">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div><span style="font-size:20px;">${icon}</span> <span style="font-weight:600;">${exercise}</span></div>
                            <div><span style="font-family:'Bebas Neue',sans-serif; font-size:24px;">${est1RM}kg</span> <span style="background:${tier.color}; padding:4px 8px; border-radius:12px; font-size:11px; color:${tier.textColor};">${tier.tier}</span></div>
                        </div>
                    </div>
                `;
            });

            if (!html) html = '<div style="text-align:center; padding:40px; color:#888;">Log your main lifts to see your Strength Matrix</div>';
            document.getElementById('strengthMatrixGrid').innerHTML = html;
        }

        function renderStats() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            const coreScore = calculateCoreStrengthScore(history);
            const accessoryData = calculateAccessoryScore(history);
            
            const thisWeek = history.filter(w => new Date(w.date) > new Date(Date.now() - 7*24*60*60*1000));
            const weeklyWorkouts = new Set(thisWeek.map(w => new Date(w.date).toDateString())).size;
            
            document.getElementById('statsCoreScore').textContent = coreScore;
            document.getElementById('statsWeeklyWorkouts').textContent = weeklyWorkouts;
            document.getElementById('statsTotalPRs').textContent = history.length;
            document.getElementById('statsAccessoryInfo').textContent = `+${accessoryData.total}kg from ${accessoryData.count} accessories`;
            
            renderStrengthMatrix();
            
            let accessoryHtml = '';
            Object.entries(accessoryData.details).slice(0,5).forEach(([name, weight]) => {
                accessoryHtml += `<div style="display:flex; justify-content:space-between; font-size:13px; padding:4px 0;"><span>${name}</span><span style="font-weight:600;">${weight}kg</span></div>`;
            });
            if (accessoryData.count > 5) accessoryHtml += `<div style="font-size:11px; color:#888; text-align:center;">+${accessoryData.count-5} more</div>`;
            document.getElementById('accessoryBreakdown').innerHTML = accessoryData.count ? `<div style="background:var(--pale-purple); padding:16px; border-radius:12px;"><div style="font-weight:600; margin-bottom:8px;">Accessory Lifts</div>${accessoryHtml}</div>` : '';
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || '[]');
            const grouped = {};
            history.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(w => {
                const date = new Date(w.date).toLocaleDateString();
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(w);
            });
            
            let html = '';
            Object.entries(grouped).forEach(([date, workouts]) => {
                html += `<div style="margin-bottom:20px;"><div style="font-weight:600; margin-bottom:8px;">${date}</div>`;
                workouts.forEach(w => {
                    html += `<div style="background:var(--pale-purple); padding:12px; border-radius:8px; margin-bottom:8px;">${w.exercise} - ${w.sets.map(s => `${s.weight}kg×${s.reps}`).join(', ')}</div>`;
                });
                html += '</div>';
            });
            document.getElementById('exerciseLogContent').innerHTML = html || '<div style="text-align:center; color:#888; padding:40px;">No workouts yet</div>';
        }

        // Initialize
        navigateToPage('home');
        renderDay();
    </script>
</body>
